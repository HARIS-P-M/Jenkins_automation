name: Deploy to K3s

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-frontend:latest,${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-frontend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            VITE_API_BASE=/api
            VITE_GOOGLE_API_KEY=${{ secrets.VITE_GOOGLE_API_KEY }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-backend:latest,${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Replace image tags in k8s manifests
        run: |
          sed -i "s|ghcr.io/YOUR_REPO/contact-manager-frontend:latest|${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-frontend:${{ github.sha }}|g" k8s/frontend.yaml
          sed -i "s|ghcr.io/YOUR_REPO/contact-manager-backend:latest|${{ env.REGISTRY }}/${{ env.REPO }}/contact-manager-backend:${{ github.sha }}|g" k8s/backend.yaml

      - name: Copy k8s manifests to EC2
        uses: appleboy/scp-action@main
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu # Change to root, ec2-user, or debian depending on your AMI
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/"
          target: "~/contact-manager-k8s"

      - name: Apply manifests on EC2 K3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu # Change to root, ec2-user, or debian depending on your AMI
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create a secret for pulling from GHCR if it's private (Optional)
            # You can uncomment and modify this if your packages are private:
            # kubectl create secret docker-registry ghcr-secret --docker-server=ghcr.io --docker-username=${{ github.actor }} --docker-password=${{ secrets.GITHUB_TOKEN }} --docker-email=your-email@example.com -n default --dry-run=client -o yaml | kubectl apply -f -
            
            # Apply all k8s manifests
            kubectl apply -f ~/contact-manager-k8s/k8s/
            
            # Wait for rollouts
            kubectl rollout status deployment/frontend --timeout=60s || true
            kubectl rollout status deployment/backend --timeout=60s || true
